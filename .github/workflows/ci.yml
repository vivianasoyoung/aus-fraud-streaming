name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    env:
      PG_PASSWORD: dummy_for_import_only
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint
        run: ruff check .

      - name: Import-check (catches syntax errors without Kafka/Postgres)
        run: |
          python -c "import sys; sys.path.insert(0, '.'); import producer.transaction_producer"
          python -c "import sys; sys.path.insert(0, '.'); import consumer.fraud_consumer"

      - name: Unit tests
        run: pytest -v

  smoke-test:
    needs: lint-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Boot the full stack
        run: |
          echo "PG_PASSWORD=ci_smoke_test_password" > .env
          docker compose up -d --build

      - name: Wait for real message flow end-to-end
        run: |
          for i in $(seq 1 30); do
            if curl -sf localhost:8000/metrics 2>/dev/null | grep -qE 'fraud_consumer_messages_processed_total\{outcome="ok"\} [1-9]'; then
              echo "Pipeline is live — consumer is processing real messages:"
              curl -sf localhost:8000/metrics | grep fraud_consumer_messages_processed_total
              exit 0
            fi
            echo "Waiting for message flow... ($i/30)"
            sleep 5
          done
          echo "No messages processed after 150s — pipeline did not come up correctly"
          docker compose ps
          docker compose logs
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v
